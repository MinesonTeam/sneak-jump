#############################################################################################

# +----------------------------------------------------------------------------------------+ #
# |                                                                                        | #
# |                                   ESSENTIAL SETTINGS                                   | #
# |                                                                                        | #
# |                Important settings that control how SneakJump functions.                | #
# |                                                                                        | #
# +----------------------------------------------------------------------------------------+ #

# Enable or disable SneakJump functionality
# Default: true
enabled: true
# Permission required to use sneak + jump
# Default: empty string, which means no permission required
permission: ""

# Minecraft gravity approximation used in jump calculation
# Default: 0.0882
gravity: 0.0882
# How many blocks high the player should jump when sneaking
# Default: 2, Maximum: 61 blocks (Minecraft limit, maybe I will fix it in the future...)
jump-height: 2
# Multiplier applied to vertical velocity each tick
# Default: 0.997
multiplier: 0.997
# Cooldown between jumps in milliseconds
# Default: 3000 milliseconds (3 seconds)
cooldown: 3000
# Food cost for performing a sneak jump (in food points, where 1 point = 0.5 food)
# 0 to disable food cost
# Default: 1 (0.5 hunger)
food-cost: 1
# If true, the plugin will use saturation first instead of hunger when performing a sneak jump
# Default: true
saturation-first: true
# If saturation-first is true, this is the saturation cost for performing a sneak jump
# Default: 1.0
saturation-cost: 1.0
# List of worlds where SneakJump is active
# Only players in these worlds will be able to sneak and jump
# Default: ["world", "world_nether", "world_the_end"]
allowed-worlds:
  - world
  - world_nether
  - world_the_end

# Cooldown message settings (ACTIONBAR, CHAT, SYSTEM, or nothing)
# Default: ACTIONBAR
cooldown-message-type: "ACTION_BAR"
# Message shown when a player tries to sneak jump while on cooldown
# {cooldown} replaces with the remaining cooldown time in seconds
cooldown-message: "¬ß8[¬ßaSneakJump¬ß8] ¬ßfWait {cooldown} seconds before jumping again."
# Energy message settings (ACTIONBAR, CHAT, SYSTEM, or nothing)
# Default: ACTIONBAR
energy-message-type: "ACTION_BAR"
# Message shown after a successful sneak jump, showing remaining energy (hunger + saturation)
# {energy} replaces with the remaining energy (hunger + saturation)
energy-message: "¬ß8[¬ßaSneakJump¬ß8] ¬ßfYou have ¬ße{energy} ¬ßfenergy left."
# No energy message settings (ACTIONBAR, CHAT, SYSTEM, or nothing)
# Default: ACTIONBAR
no-energy-message-type: "ACTION_BAR"
# Message shown when a player tries to sneak jump without enough energy
no-energy-message: "¬ß8[¬ßaSneakJump¬ß8] ¬ßfYou don't have enough energy to sneak jump."
# Shows useful commands
# {0} replaces with a command label
# /sneakjump help
help-messages:
  - "¬ß7=== ¬ßaSneakJump Commands ¬ß7==="
  - "¬ße/{0} help ¬ß8- ¬ßfShows this help message."
  - "¬ße/{0} reload ¬ß8- ¬ßfReloads the config."
# Reloads the config
# /sneakjump reload
reload-message: "¬ß8[¬ßaSneakJump¬ß8] ¬ßfSuccessfully reloaded the config."

# Config version (do not modify)
version: 1
